version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=3600'
    - pattern: '/assets/*'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=31536000, immutable'
    - pattern: '/index.html'
      headers:
        - key: 'Cache-Control'
          value: 'no-cache, no-store, must-revalidate'

# Backend (Express API) build configuration
backend:
  phases:
    preBuild:
      commands:
        - npm ci --include=dev
    build:
      commands:
        - echo "Building backend for AWS Lambda..."
        - npm run build:server
  artifacts:
    baseDirectory: dist-server
    files:
      - '**/*'

# Environment variables for Amplify
# Note: Set sensitive values (API keys) in Amplify Console, not here
env:
  variables:
    NODE_ENV: production
    PORT: 3001
    DEBUG_STATIC: 'false'
