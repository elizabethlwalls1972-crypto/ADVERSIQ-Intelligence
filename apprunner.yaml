version: 1.0
runtime: nodejs18
build:
  commands:
    pre-build:
      - npm ci
    build:
      - npm run build
      - npm run build:server
  env:
    - name: NODE_ENV
      value: "production"
    # Empty VITE_API_BASE_URL so the frontend uses relative /api paths (same-origin)
    - name: VITE_API_BASE_URL
      value: ""
run:
  command: node dist-server/server/index.js
  network:
    port: 3000
    env: PORT
  env:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "3000"
    # ─── Set these in App Runner Console → Environment Variables ───
    # GROQ_API_KEY          (from .env line 1)
    # TOGETHER_API_KEY      (legacy key)
    # SERPER_API_KEY        (optional - Google search)
    # NEWS_API_KEY          (optional - news monitoring)
    # ALPHA_VANTAGE_API_KEY (optional - financial data)
    # PERPLEXITY_API_KEY    (optional - AI research)
