name = "adversiq-intelligence"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# KV namespace for persistent agent memory
[[kv_namespaces]]
binding = "NSIL_MEMORY"
id = "385338eaef31405da6ee1803f4077f8a"  # adversiq-intelligence-data namespace

# Production environment with AI binding
[env.production]
vars = { ENVIRONMENT = "production" }

# AI binding for Cloudflare Workers AI models (needs to be configured in dashboard)
# This will be bound to AI variable in your functions
