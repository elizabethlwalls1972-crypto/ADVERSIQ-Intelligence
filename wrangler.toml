name = "adversiq-intelligence"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# Pages Functions environment
[vars]
ENVIRONMENT = "production"

# KV namespace for persistent agent memory
[[kv_namespaces]]
binding = "NSIL_MEMORY"
id = "385338eaef31405da6ee1803f4077f8a"  # adversiq-intelligence-data namespace

# Workers AI binding exposed as env.AI in Pages Functions.
[ai]
binding = "AI"
